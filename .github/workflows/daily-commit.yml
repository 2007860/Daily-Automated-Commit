name: Daily Automated Commit

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f2007860@ds.study.iitm.ac.in - Generate daily commit
        run: |
          echo "Last updated on $(date -u)" > daily-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "24f2007860@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes to commit"
          git push
