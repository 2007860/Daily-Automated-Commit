name: Daily Automated Commit

on:
  schedule:
    # Runs daily at 10:30 UTC (change if needed, but no wildcards allowed)
    - cron: '30 10 * * *'
  workflow_dispatch:  # Allows manual trigger for testing

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 24f2007860@ds.study.iitm.ac.in - Generate daily commit
        run: |
          echo "Last updated on $(date -u)" > daily-log.txt
          
          git config --global user.name "DevSync Bot"
          git config --global user.email "24f2007860@ds.study.iitm.ac.in"
          
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes to commit"
          git push
